services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tgrepostbot
    env_file:
      - path: .env
        required: true
    volumes:
      - bot-data:/app/data
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
    healthcheck:
      test: ["CMD", "python", "-c", "import pathlib; pathlib.Path('/app/data').mkdir(exist_ok=True); print('ok')"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  bot-data:
    driver: local
